services:
  - type: web
    name: nivaas
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: OVERDUE_DAYS
        value: "7"
      - key: ADMIN_EMAIL
        value: admin@nivaas-society.com
      - key: ADMIN_PASSWORD
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: nivaas-db
          property: connectionString

databases:
  - name: nivaas-db
    plan: free
